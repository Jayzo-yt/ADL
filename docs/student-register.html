<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register - CertiVerify</title>
    <link rel="stylesheet" th:href="@{https://adl-dep-50042114867.development.catalystappsail.in/css/style.css}" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-brand">
                <a href="index.html" th:href="@{https://adl-dep-50042114867.development.catalystappsail.in/}" style="display:flex; align-items:center; gap:0.75rem; text-decoration:none;">
                    <svg style="width: 2rem; height: 2rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    CertiVerify
                </a>
            </div>
            <div class="navbar-nav">
                <a th:href="@{https://adl-dep-50042114867.development.catalystappsail.in/login}" href="login.html" class="btn btn-secondary">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="card card-glass max-w-3xl w-full">
            <div class="card-header">
                <h2 style="font-size: 1.875rem;">Create Student Account</h2>
                <p class="mt-2" style="color: var(--text-muted);">Sign up to view and download your certificates</p>
            </div>
            <div class="card-body" style="padding-top: 0;">
                <form th:action="@{https://adl-dep-50042114867.development.catalystappsail.in/register/student}" th:object="${user}" method="post">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
                        <div class="form-group mb-0">
                            <label class="form-label">Username</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Student username" required>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="student@university.edu" required>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Student full name">
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">Phone Number</label>
                            <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="10-digit mobile number">
                        </div>
                        <div class="form-group mb-0" style="grid-column: span 2;">
                            <label class="form-label">Institution / Organization</label>
                            <input type="text" th:field="*{organization}" class="form-control" placeholder="Your university or college">
                        </div>
                    </div>
                    <div class="mt-8">
                        <button type="submit" class="btn btn-primary w-full" style="padding: 0.875rem;">
                            Create Student Account
                        </button>
                    </div>
                </form>

                <div class="text-center mt-8">
                    <p style="color: var(--text-muted); font-size: 0.875rem;">
                        Already registered?
                        <a th:href="@{https://adl-dep-50042114867.development.catalystappsail.in/login}" href="login.html" style="font-weight: 600;">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
