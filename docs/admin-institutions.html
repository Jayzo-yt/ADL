<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Institutions - CertiVerify</title>
    <link rel="stylesheet" th:href="@{https://adl-dep-50042114867.development.catalystappsail.in/css/style.css}" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-brand">
                <a href="index.html" th:href="@{https://adl-dep-50042114867.development.catalystappsail.in/}" style="display:flex; align-items:center; gap:0.75rem; text-decoration:none;">
                    <svg style="width: 2rem; height: 2rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    CertiVerify Admin
                </a>
            </div>
            <div class="navbar-nav">
                <a th:href="@{https://adl-dep-50042114867.development.catalystappsail.in/admin/dashboard}" class="btn btn-secondary btn-sm">Dashboard</a>
                <form th:action="@{https://adl-dep-50042114867.development.catalystappsail.in/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="main-content" style="align-items: flex-start;">
        <div class="container">
            <div class="flex" style="align-items: center; justify-content: space-between; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Manage Institutions</h1>
                    <p style="color: var(--text-muted);">Add, enable/disable, and manage registered institutions.</p>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-error"><p th:text="${error}"></p></div>
            <div th:if="${success}" class="alert alert-success"><p th:text="${success}"></p></div>

            <!-- Add Institution Form -->
            <div class="card mb-8">
                <div class="card-body">
                    <h3 style="font-size: 1.125rem; margin-bottom: 1.5rem;">Add New Institution</h3>
                    <form th:action="@{https://adl-dep-50042114867.development.catalystappsail.in/admin/institutions/add}" th:object="${newInstitution}" method="post">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                            <div class="form-group mb-0">
                                <label class="form-label">Institution Name *</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Stanford University" required>
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Code *</label>
                                <input type="text" th:field="*{code}" class="form-control" placeholder="e.g. STANFORD" required>
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="admin@university.edu">
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Phone</label>
                                <input type="text" th:field="*{phone}" class="form-control" placeholder="+1 555-0100">
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Institution Login Username *</label>
                                <input type="text" name="institutionUsername" class="form-control" placeholder="e.g. stanford_admin" required>
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Institution Login Password *</label>
                                <input type="password" name="institutionPassword" class="form-control" placeholder="Minimum 6 characters" minlength="6" required>
                            </div>
                            <div class="form-group mb-0" style="grid-column: span 2;">
                                <label class="form-label">Address</label>
                                <input type="text" th:field="*{address}" class="form-control" placeholder="Full address">
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <svg style="width:1rem;height:1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                                Add Institution
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Institutions Table -->
            <div class="card">
                <div class="table-wrapper" style="border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Code</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="inst : ${institutions}">
                                <td style="font-family: monospace; font-weight: 500;" th:text="${inst.id}">1</td>
                                <td style="font-weight: 600;" th:text="${inst.name}">University</td>
                                <td><span class="badge badge-primary" th:text="${inst.code}">CODE</span></td>
                                <td style="color: var(--text-muted); font-size: 0.875rem;" th:text="${inst.email}">email</td>
                                <td>
                                    <span th:if="${inst.enabled}" class="badge badge-success">Active</span>
                                    <span th:unless="${inst.enabled}" class="badge badge-danger">Disabled</span>
                                </td>
                                <td style="color: var(--text-muted); font-size: 0.8rem;" th:text="${inst.createdAt}">date</td>
                                <td>
                                    <div class="flex" style="gap: 0.5rem;">
                                        <form th:action="@{https://adl-dep-50042114867.development.catalystappsail.in/admin/institutions/{id}/toggle(id=${inst.id})}" method="post" style="display:inline;">
                                            <button type="submit" th:class="${inst.enabled ? 'btn btn-outline btn-sm' : 'btn btn-success btn-sm'}" th:text="${inst.enabled ? 'Disable' : 'Enable'}">Toggle</button>
                                        </form>
                                        <form th:action="@{https://adl-dep-50042114867.development.catalystappsail.in/admin/institutions/{id}/delete(id=${inst.id})}" method="post" style="display:inline;" onsubmit="return confirm('Delete this institution?');">
                                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(institutions)}" class="empty-state">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    <h3>No institutions yet</h3>
                    <p>Add your first institution using the form above.</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
