<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CertiVerify</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-brand">
                <a href="index.html" th:href="@{/}" style="display:flex; align-items:center; gap:0.75rem; text-decoration:none;">
                    <svg style="width: 2rem; height: 2rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    CertiVerify
                </a>
            </div>
            <div class="navbar-nav">
                <a th:href="@{/register/student}" href="register.html" class="btn btn-secondary">Student Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="card card-glass max-w-md w-full">
            <div class="card-header">
                <h2 style="font-size: 1.875rem;">🔐 Login</h2>
                <p class="mt-2" style="color: var(--text-muted);">Sign in to access your account</p>
            </div>
            <div class="card-body" style="padding-top: 0;">
                
                <div th:if="${param.error}" class="alert alert-error">
                    Invalid username or password. Please try again.
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    You have been securely logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label for="username" class="form-label">Username / Email</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="admin / student@email.com / institution-user" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-full mt-4" style="padding: 0.875rem;">
                        Sign In
                    </button>
                </form>

                <div class="text-center mt-8">
                    <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.5rem;">
                        👤 Are you a student?
                        <a th:href="@{/register/student}" href="register.html" style="font-weight: 600;">Register student account</a>
                    </p>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">
                        🏫 Are you from an institution? 
                        <span style="font-weight: 600;">Contact admin to get credentials</span>
                    </p>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
