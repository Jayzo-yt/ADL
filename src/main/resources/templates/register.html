<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
<h1>Register</h1>
<p>Create a university / college account to upload student certificate details.</p>

<form th:action="@{/register}" th:object="${user}" method="post">
    <div>
        <label>Username</label>
        <input type="text" th:field="*{username}" required>
    </div>
    <div>
        <label>Email</label>
        <input type="email" th:field="*{email}" required>
    </div>
    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" required>
    </div>
    <div>
        <label>Confirm Password</label>
        <input type="password" th:field="*{confirmPassword}" required>
    </div>
    <div>
        <label>Full Name</label>
        <input type="text" th:field="*{fullName}">
    </div>
    <div>
        <label>Phone Number</label>
        <input type="text" th:field="*{phoneNumber}">
    </div>
    <div>
        <label>Organization</label>
        <input type="text" th:field="*{organization}">
    </div>
    <button type="submit">Register</button>
</form>

<p>
    <a th:href="@{/login}">Back to login</a> |
    <a th:href="@{/home}">Back to Public Verification</a>
</p>
</body>
</html>
